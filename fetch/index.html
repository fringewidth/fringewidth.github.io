<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#246ddb">
  <title>Fetch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: "Courier New", Courier, monospace;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* --- HUD --- */
    #hud {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 14px;
      pointer-events: none;
      color: #fff;
      font-weight: bold;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.55);
      font-size: clamp(14px, 4.5vw, 20px);
      letter-spacing: 1px;
    }

    #score {
      white-space: pre;
      pointer-events: auto;
    }

    #themeBtn {
      pointer-events: auto;
      display: none;
      background: #14141c;
      color: #fff;
      border: 3px solid #fff;
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.5);
      font-family: inherit;
      font-weight: bold;
      font-size: clamp(12px, 3.8vw, 16px);
      letter-spacing: 1px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #themeBtn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
    }

    #hint {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(12px, 3.8vw, 16px);
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.55);
      pointer-events: none;
      transition: opacity 0.6s;
    }

    #toast {
      position: fixed;
      top: 22%;
      left: 0;
      right: 0;
      text-align: center;
      color: #fff;
      font-size: clamp(16px, 6vw, 26px);
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.6);
      pointer-events: none;
      opacity: 0;
    }

    #toast.show {
      animation: toastUp 1.1s ease-out;
    }

    @keyframes toastUp {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }

      20% {
        opacity: 1;
        transform: translateY(0);
      }

      75% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-14px);
      }
    }

    /* --- speech bubble popup --- */
    #backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      z-index: 10;
    }

    #bubble {
      position: fixed;
      left: 50%;
      bottom: 18%;
      transform: translateX(-50%);
      width: min(86vw, 420px);
      background: #14141c;
      color: #f2f2f7;
      border: 4px solid #f2f2f7;
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.55);
      padding: 18px 16px 14px;
      display: none;
      z-index: 11;
      text-align: center;
    }

    /* tail pointing down-left toward the dog */
    #bubble::after {
      content: "";
      position: absolute;
      left: 18%;
      bottom: -18px;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 18px solid #f2f2f7;
    }

    #bubble::before {
      content: "";
      position: absolute;
      left: calc(18% + 4px);
      bottom: -10px;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 14px solid #14141c;
      z-index: 1;
    }

    #bubbleText {
      font-size: clamp(15px, 4.6vw, 19px);
      font-weight: bold;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    #bubbleArt {
      margin: 14px auto 0;
      display: none;
      max-width: 70%;
      max-height: 28vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #bubbleTap {
      margin-top: 14px;
      font-size: clamp(11px, 3.2vw, 13px);
      color: #9a9aad;
      letter-spacing: 2px;
      animation: blink 1.2s steps(2) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0.25;
      }
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="score">SCORE 0</div>
    <button id="themeBtn" type="button">SKY: DAY</button>
  </div>
  <div id="hint">TAP THE GRASS TO THROW THE STICK</div>
  <div id="toast"></div>
  <div id="backdrop"></div>
  <div id="bubble">
    <div id="bubbleText"></div>
    <img id="bubbleArt" alt="">
    <div id="bubbleTap">TAP TO CLOSE</div>
  </div>

  <script>
    "use strict";

    /* ============================================================
     * 1. CONFIG - everything you'll want to edit lives here.
     * ============================================================ */

    /* ---- MESSAGES ----------------------------------------------
     * Shown one per fetch (in order) once the translate feature is
     * unlocked. Add / remove / reorder freely. `art` is an optional
     * URL to a pixel-art image shown below the text. `\n` breaks a
     * line. A long message can span several bubble pages: use
     * `pages` instead of `text`/`art` - one fetch shows the pages
     * in a row, each tap turns the page, and every page can carry
     * its own art (or none).
     */
    const MESSAGES = [
      { text: "My human misses you a lot :(", art: null },
      { text: "He hopes you're smiling more, just like how you are now. You really have the prettiest smile, you know?", art: null },
      {
        pages:[
          { text: "Okay so...", art: null },
          { text: "He wanted to ask if you're free this weekend.", art: null},
          { text: "He wants to show you the night sky at this spot he gatekeeps. The moon rises late that day.", art: null},
        ],
      },
      {
        pages: [
          { text: "Just let him know okay? Late moonrise means the skies will be gorgeous.", art: null },
          { text: "This reminds me...", art: null },
        ],
      }
   ];

    /* ---- GAME TUNING ------------------------------------------- */
    const CONFIG = {
      POINTS_PER_FETCH: 5,
      TRANSLATE_UNLOCK_AT: 5,  // score that unlocks the translate feature
      // game-px per second along the direction of travel; tune each
      // against the matching sprite's walk cycle (with its fps)
      DOG_SPEED: { N: 58, NE: 58, S: 58, SW: 58 },
      STICK_FLIGHT_MS: 700,
      PICKUP_PAUSE_MS: 450,
      SAVE_KEY: "fetch-dog-save-v1",
    };

    /* ---- SPRITES ------------------------------------------------
     * `src`: PNG path or URL; null (or a failed load) falls back to
     *   a built-in placeholder.
     * Sheets may be horizontal strips or grids: `frames` is the
     *   total count, `cols` is frames per row (default: one row).
     * `size`: drawn height in game-px (the world is 160 wide, so
     *   32 covers a fifth of the screen). Omit to keep native size.
     * `feet`: transparent SOURCE px between the frame's bottom edge
     *   and the lowest paw pixel - anchors feet to the ground.
     * `detail: 2`: renders on a grid twice as fine as the world
     *   (same on-screen size, double the pixel detail).
     *
     * Directions: runN fetches straight up, runNE up-right;
     * runS / runSW return with the stick baked into the art, so the
     * game hides the loose stick while the dog carries it.
     */
    const SPRITES = {
      idle: { src: "assets/dog_idle.png", frames: 16, cols: 4, fps: 8, size: 32, feet: 12, detail: 2 },
      runN: { src: "assets/dog_north.png", frames: 5, cols: 5, fps: 10, size: 32, feet: 15, detail: 2 },
      runNE: { src: "assets/dog_northeast.png", frames: 4, cols: 2, fps: 10, size: 32, feet: 8, detail: 2 },
      runS: { src: "assets/dog_south.png", frames: 5, cols: 5, fps: 10, size: 32, feet: 25, detail: 2 },
      runSW: { src: "assets/dog_southwest.png", frames: 4, cols: 2, fps: 10, size: 32, feet: 28, detail: 2 },
      stick: { src: "assets/stick.png", frames: 1, size: 10, feet: 135 },
      sun: { src: null },
      moon: { src: null },
      cloud: { src: null },
    };

    /* ---- SKY THEMES ---------------------------------------------
     * All colors snap to the Sega Mega Drive palette (9-bit RGB,
     * 8 levels per channel) - edit freely, they get quantized.
     * `sky` is EXACTLY the flat bands drawn top to bottom: 3-4
     *   hand-shaded tones of one hue, dithered at the seams.
     * `body` is the sprite hanging in the sky; `bodyPos` its base
     *   position as fractions of (width, sky height). `glow` paints
     *   halo rings behind it, outermost color first (null = none).
     * Clouds are lit by the sun/moon: `cloudLit` / `cloudShade` are
     *   4-step ramps indexed by distance from the light (0 nearest).
     * `shadowAlpha` is the strength of cast shadows on the ground.
     */
    const THEMES = {
      day: {
        label: "DAY",
        sky: ["#246ddb", "#4992db", "#6db6db", "#92dbdb"],
        ground: "#4a8f3c", groundLight: "#5da04a", groundDark: "#3c7530",
        body: "sun", bodyPos: [0.70, 0.38], glow: null,
        stars: false, cloudAlpha: 1.0, shadowAlpha: 0.28,
        cloudLit: ["#f4f4ee", "#e8ecea", "#d8e2e2", "#c8d4da"],
        cloudShade: ["#b8c8d0", "#a8bcc8", "#98acc0", "#8ca0b4"],
      },
      sunset: {
        label: "SUNSET",
        sky: ["#922449", "#b64924", "#db6d24", "#ff9249"],
        ground: "#3a6a2e", groundLight: "#4a7a38", groundDark: "#2e5424",
        body: "sun", bodyPos: [0.24, 0.78], glow: ["#eda24e", "#f6d27c"],
        stars: false, cloudAlpha: 1.0, shadowAlpha: 0.34,
        cloudLit: ["#f6d27c", "#e89a5a", "#b86878", "#7c5484"],
        cloudShade: ["#c87848", "#985058", "#6c4468", "#4c3a5c"],
      },
      night: {
        label: "NIGHT",
        sky: ["#000024", "#002449", "#24496d"],
        ground: "#20381c", groundLight: "#2a4424", groundDark: "#182c14",
        body: "moon", bodyPos: [0.68, 0.32], glow: ["#2c3660"],
        stars: true, cloudAlpha: 0.9, shadowAlpha: 0.18,
        cloudLit: ["#6a74a0", "#565e88", "#464c70", "#383e5c"],
        cloudShade: ["#3a4060", "#323852", "#2a2f46", "#24283c"],
      },
    };
    const THEME_ORDER = ["day", "sunset", "night"];

    /* ---- SKY GENERATION (randomized per load) ------------------- */
    const SKY = {
      CLOUDS_MIN: 3, CLOUDS_MAX: 5,
      DRIFT_MAX: 2.0,       // max cloud drift, game-px per second
      STARS_MIN: 30, STARS_MAX: 60,
      SUN_JITTER: 0.09,     // random sun/moon offset per load (fraction)
    };

    /* ============================================================
     * 2. PALETTE - Mega Drive quantization for procedural colors.
     * ============================================================ */

    const MD_LEVELS = [0, 36, 73, 109, 146, 182, 219, 255];

    function hexRGB(h) {
      return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
    }

    function q(hex) {
      const c = hexRGB(hex).map((v) => MD_LEVELS[Math.round(v / 255 * 7)]);
      return "#" + c.map((v) => v.toString(16).padStart(2, "0")).join("");
    }

    for (const t of Object.values(THEMES)) {
      t.sky = t.sky.map(q);
      t.ground = q(t.ground);
      t.groundLight = q(t.groundLight);
      t.groundDark = q(t.groundDark);
      if (t.glow) t.glow = t.glow.map(q);
      t.cloudLit = t.cloudLit.map(q);
      t.cloudShade = t.cloudShade.map(q);
    }

    /* ============================================================
     * 3. CANVAS & LAYOUT
     * ============================================================ */

    const GW = 160;   // world width in game pixels
    const RES = 2;    // canvas supersample; sprites with `detail: 2`
    // render on a grid twice as fine as the world
    let GH = 284;     // world height, follows the screen's aspect
    let horizonY = 142;
    let homeY = 272;            // dog's home = bottom-left corner
    const HOME_X = 20;

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resize() {
      const aspect = window.innerHeight / window.innerWidth;
      GH = Math.max(200, Math.min(420, Math.round(GW * aspect)));
      canvas.width = GW * RES;
      canvas.height = GH * RES;
      horizonY = Math.round(GH * 0.50);   // 50% sky, 50% grass
      homeY = GH - 12;
      ctx.setTransform(RES, 0, 0, RES, 0, 0);  // draw in world units
      ctx.imageSmoothingEnabled = false;
      if (dog.state === "idle") { dog.x = HOME_X; dog.y = homeY; }
      regenScene();
      rebuildSky();
    }

    /* ============================================================
     * 4. ASSETS - placeholders, loading, sheet normalization.
     * ============================================================ */

    const ART = {}; // key -> { img (strip), frames, fps, detail, fw, fh, pad, shadow }

    function makeCanvas(w, h) {
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      return c;
    }

    /* --- placeholder art, used until real sprites load --- */
    const PAL = {};
    {
      const raw = { out: "#33210f", body: "#a5713f", dark: "#7c5026", belly: "#d9b98a", stick: "#8a5a2b", stickD: "#6b431f" };
      for (const k in raw) PAL[k] = q(raw[k]);
    }

    function phDogSide(withStick, facingLeft) {
      const c = makeCanvas(44, 16);
      const g = c.getContext("2d");
      for (let f = 0; f < 2; f++) {
        g.save();
        if (facingLeft) { g.translate(f * 22 + 22, 0); g.scale(-1, 1); }
        else { g.translate(f * 22, 0); }
        g.fillStyle = PAL.body;
        g.fillRect(3, 6, 10, 5);              // body
        g.fillRect(12, 3, 5, 5);              // head
        g.fillStyle = PAL.dark;
        g.fillRect(12, 1, 2, 3);              // ear
        g.fillRect(16, 5, 2, 2);              // snout
        g.fillRect(1, 5 + f, 2, 2);           // tail bobs
        g.fillStyle = PAL.out;
        g.fillRect(14, 4, 1, 1);              // eye
        g.fillStyle = PAL.dark;
        if (f === 0) { g.fillRect(4, 11, 2, 4); g.fillRect(10, 11, 2, 4); }
        else { g.fillRect(3, 11, 2, 4); g.fillRect(11, 11, 2, 4); }
        if (withStick) {
          g.fillStyle = PAL.stick;
          g.fillRect(15, 7, 7, 2);
          g.fillStyle = PAL.stickD;
          g.fillRect(20, 6, 2, 2);
        }
        g.restore();
      }
      return c;
    }

    function phDogVert(front, withStick) {
      const c = makeCanvas(32, 16);
      const g = c.getContext("2d");
      for (let f = 0; f < 2; f++) {
        g.save();
        g.translate(f * 16, 0);
        g.fillStyle = PAL.body;
        g.fillRect(5, 6, 6, 6);               // body
        g.fillRect(4, 1, 8, 6);               // head
        g.fillStyle = PAL.dark;
        g.fillRect(3, 0, 2, 3);               // ears
        g.fillRect(11, 0, 2, 3);
        if (f === 0) g.fillRect(2, 7, 3, 2);  // tail wags side to side
        else g.fillRect(11, 7, 3, 2);
        if (front) {
          g.fillStyle = PAL.out;
          g.fillRect(6, 3, 1, 1);             // eyes
          g.fillRect(9, 3, 1, 1);
          g.fillStyle = PAL.belly;
          g.fillRect(6, 9, 4, 3);
        }
        g.fillStyle = PAL.dark;
        if (f === 0) { g.fillRect(5, 12, 2, 4); g.fillRect(9, 12, 2, 4); }
        else { g.fillRect(4, 12, 2, 4); g.fillRect(10, 12, 2, 4); }
        if (withStick) {
          g.fillStyle = PAL.stick;
          g.fillRect(2, 5, 12, 2);
          g.fillStyle = PAL.stickD;
          g.fillRect(2, 5, 2, 2);
          g.fillRect(12, 5, 2, 2);
        }
        g.restore();
      }
      return c;
    }

    function phStick() {
      const c = makeCanvas(10, 4);
      const g = c.getContext("2d");
      g.fillStyle = PAL.stick;
      g.fillRect(0, 1, 10, 2);
      g.fillStyle = PAL.stickD;
      g.fillRect(2, 0, 2, 2);
      g.fillRect(7, 2, 2, 2);
      return c;
    }

    function phSun() {
      const c = makeCanvas(16, 16);
      const g = c.getContext("2d");
      g.fillStyle = q("#ffd83d");
      g.fillRect(4, 2, 8, 12); g.fillRect(2, 4, 12, 8);
      g.fillStyle = q("#ffb02e");
      g.fillRect(0, 7, 2, 2); g.fillRect(14, 7, 2, 2);
      g.fillRect(7, 0, 2, 2); g.fillRect(7, 14, 2, 2);
      return c;
    }

    function phMoon() {
      const c = makeCanvas(14, 14);
      const g = c.getContext("2d");
      g.fillStyle = q("#e8e8d8");
      g.fillRect(3, 1, 8, 12); g.fillRect(1, 3, 12, 8);
      g.globalCompositeOperation = "destination-out";
      g.fillRect(6, 0, 10, 10);
      g.globalCompositeOperation = "source-over";
      g.fillStyle = q("#c9c9b4");
      g.fillRect(3, 8, 2, 2); g.fillRect(6, 11, 2, 1);
      return c;
    }

    function phCloud() {
      const c = makeCanvas(28, 12);
      const g = c.getContext("2d");
      g.fillStyle = "#ffffff";
      g.fillRect(4, 5, 20, 5);
      g.fillRect(8, 2, 8, 4);
      g.fillRect(17, 3, 6, 3);
      g.fillRect(1, 7, 4, 3);
      g.fillRect(23, 7, 4, 3);
      return c;
    }

    /* each factory returns { img, frames } so the loader can treat
     * placeholders exactly like real sheets */
    const PLACEHOLDERS = {
      idle: () => ({ img: phDogVert(true, false), frames: 2 }),
      runN: () => ({ img: phDogVert(false, false), frames: 2 }),
      runNE: () => ({ img: phDogSide(false, false), frames: 2 }),
      runS: () => ({ img: phDogVert(true, true), frames: 2 }),
      runSW: () => ({ img: phDogSide(true, true), frames: 2 }),
      stick: () => ({ img: phStick(), frames: 1 }),
      sun: () => ({ img: phSun(), frames: 1 }),
      moon: () => ({ img: phMoon(), frames: 1 }),
      cloud: () => ({ img: phCloud(), frames: 1 }),
    };

    /* Slice a sheet (strip or grid) into a horizontal strip resampled
     * once, nearest-neighbor, to its game size - gameplay never touches
     * the source resolution again. Also bakes the black silhouette
     * strip used for cast shadows. */
    function loadSprites() {
      const jobs = Object.keys(SPRITES).map((key) => {
        const spec = SPRITES[key];
        return new Promise((resolve) => {
          const finish = (img, frames, cols, feetSrc, detail) => {
            const rows = Math.ceil(frames / cols);
            const sfw = Math.floor(img.width / cols);
            const sfh = Math.floor(img.height / rows);
            const fh = (spec.size || sfh) * detail;
            const fw = Math.max(1, Math.round(sfw * fh / sfh));
            const strip = makeCanvas(fw * frames, fh);
            const g = strip.getContext("2d");
            g.imageSmoothingEnabled = false;
            for (let f = 0; f < frames; f++) {
              g.drawImage(img,
                (f % cols) * sfw, Math.floor(f / cols) * sfh, sfw, sfh,
                f * fw, 0, fw, fh);
            }
            const pad = Math.round((feetSrc || 0) * fh / sfh);
            const shadow = makeCanvas(strip.width, strip.height);
            const sg = shadow.getContext("2d");
            sg.drawImage(strip, 0, 0);
            sg.globalCompositeOperation = "source-atop";
            sg.fillStyle = "#000";
            sg.fillRect(0, 0, shadow.width, shadow.height);
            ART[key] = { img: strip, frames, fps: spec.fps || 1, detail, fw, fh, pad, shadow };
            resolve();
          };
          const usePlaceholder = () => {
            const ph = PLACEHOLDERS[key]();
            finish(ph.img, ph.frames, ph.frames, 0, 1); // placeholders stay coarse
          };
          if (spec.src) {
            const img = new Image();
            img.onload = () => finish(img, spec.frames, spec.cols || spec.frames, spec.feet, spec.detail || 1);
            img.onerror = usePlaceholder;  // a broken URL never blanks the game
            img.src = spec.src;
          } else {
            usePlaceholder();
          }
        });
      });
      return Promise.all(jobs);
    }

    /* ============================================================
     * 5. SCENERY - per-load randomness, sky cache, clouds.
     * ============================================================ */

    const scene = { clouds: [], stars: [], tufts: [], jx: 0, jy: 0 };
    let skyCanvas = null;   // pre-rendered sky: bands, stars, halo, sun/moon

    function rnd(a, b) { return a + Math.random() * (b - a); }

    function regenScene() {
      scene.jx = rnd(-SKY.SUN_JITTER, SKY.SUN_JITTER);
      scene.jy = rnd(-SKY.SUN_JITTER * 0.7, SKY.SUN_JITTER);
      scene.stars = [];
      const nStars = Math.round(rnd(SKY.STARS_MIN, SKY.STARS_MAX));
      for (let i = 0; i < nStars; i++) {
        scene.stars.push([Math.random(), Math.random(), Math.random() < 0.2 ? 2 : 1]);
      }
      scene.tufts = [];
      for (let i = 0; i < 34; i++) scene.tufts.push([Math.random(), Math.random()]);
      scene.clouds = [];
      const nClouds = Math.round(rnd(SKY.CLOUDS_MIN, SKY.CLOUDS_MAX));
      for (let i = 0; i < nClouds; i++) {
        scene.clouds.push({
          x: Math.random() * GW,
          fy: rnd(0.08, 0.70),    // position and size as sky fractions
          fw: rnd(0.18, 0.40),
          fh: rnd(0.07, 0.15),
          drift: rnd(0.4, SKY.DRIFT_MAX) * (Math.random() < 0.5 ? -1 : 1),
          sil: null,              // silhouette canvas, made lazily
          bucket: -1,             // light-distance bucket of current tint
          tinted: null,
        });
      }
    }

    /* random blobby silhouette (used when no cloud art is set) */
    function genCloudSil() {
      const w = Math.round(rnd(22, 40)), h = Math.round(rnd(10, 16));
      const c = makeCanvas(w, h), g = c.getContext("2d");
      g.fillStyle = "#fff";
      const base = Math.round(h * 0.5);
      g.fillRect(2, base, w - 4, h - base - 1);
      const bumps = 3 + Math.floor(Math.random() * 3);
      for (let i = 0; i < bumps; i++) {
        const bw = Math.round(rnd(4, w * 0.4));
        const bx = Math.round(rnd(1, Math.max(2, w - bw - 1)));
        const bh = Math.round(rnd(2, base));
        g.fillRect(bx, base - bh, bw, bh + 1);
      }
      g.fillRect(0, base + 1, 2, Math.max(1, h - base - 3));
      g.fillRect(w - 2, base + 1, 2, Math.max(1, h - base - 3));
      return c;
    }

    function sunPos(th) {
      const fx = Math.min(0.90, Math.max(0.08, th.bodyPos[0] + scene.jx));
      const fy = Math.min(0.85, Math.max(0.12, th.bodyPos[1] + scene.jy));
      return [fx * GW, fy * horizonY];
    }

    /* colorize a cloud silhouette: lit on top, shaded underside */
    function tintCloud(sil, lit, shade) {
      const c = makeCanvas(sil.width, sil.height);
      const g = c.getContext("2d");
      g.drawImage(sil, 0, 0);
      g.globalCompositeOperation = "source-atop";
      g.fillStyle = lit;
      g.fillRect(0, 0, c.width, c.height);
      g.fillStyle = shade;
      g.fillRect(0, Math.round(c.height * 0.55), c.width, Math.ceil(c.height * 0.45));
      return c;
    }

    /* pre-render the static sky once per theme change / resize */
    function rebuildSky() {
      const th = THEMES[save.theme] || THEMES.day;
      if (!ART[th.body]) return;   // sprites not loaded yet
      skyCanvas = makeCanvas(GW, horizonY);
      const g = skyCanvas.getContext("2d");

      // the theme's shades ARE the bands - flat fills, no blending
      const cols = th.sky;
      const bandH = horizonY / cols.length;
      for (let b = 0; b < cols.length; b++) {
        g.fillStyle = cols[b];
        g.fillRect(0, Math.round(b * bandH), GW, Math.ceil(bandH) + 1);
      }
      // 2x2 checker dithering along each band seam
      for (let b = 1; b < cols.length; b++) {
        const y = Math.round(b * bandH);
        g.fillStyle = cols[b];
        for (let x = 0; x < GW; x += 4) g.fillRect(x, y - 2, 2, 2);
        g.fillStyle = cols[b - 1];
        for (let x = 2; x < GW; x += 4) g.fillRect(x, y, 2, 2);
      }

      if (th.stars) {
        g.fillStyle = q("#d8d8e8");
        for (const s of scene.stars) {
          g.fillRect(Math.round(s[0] * (GW - 2)), Math.round(s[1] * (horizonY - 10)), s[2], s[2]);
        }
      }

      // halo rings, then the sun/moon at uniform scale (never squished)
      const [sx, sy] = sunPos(th);
      if (th.glow) {
        for (let i = 0; i < th.glow.length; i++) {
          g.fillStyle = th.glow[i];
          g.beginPath();
          g.arc(Math.round(sx), Math.round(sy), 7 + (th.glow.length - i) * 5, 0, Math.PI * 2);
          g.fill();
        }
      }
      const body = ART[th.body];
      const bd = body.detail;
      g.drawImage(body.img, 0, 0, body.fw, body.fh,
        Math.round(sx - body.fw / bd / 2), Math.round(sy - body.fh / bd / 2),
        body.fw / bd, body.fh / bd);
    }

    /* ============================================================
     * 6. RENDERING
     * ============================================================ */

    function frameIndex(a, frame, animT) {
      if (a.frames <= 1) return 0;
      return frame !== null ? frame : Math.floor(animT * a.fps) % a.frames;
    }

    function drawSprite(key, cx, bottomY, frame, animT) {
      const a = ART[key];
      if (!a) return;
      const f = frameIndex(a, frame, animT);
      const d = a.detail;
      const w = a.fw / d;   // world-unit size; detail sprites keep finer pixels
      const h = a.fh / d;
      const pad = a.pad / d;
      // anchor the lowest content pixel (feet) to bottomY, snapping
      // to the sprite's own (finer) grid
      const x = Math.round((cx - w / 2) * d) / d;
      const y = Math.round((bottomY - h + pad) * d) / d;
      ctx.drawImage(a.img, f * a.fw, 0, a.fw, a.fh, x, y, w, h);
    }

    /* cast shadow: the sprite's silhouette sheared away from the
     * sun/moon and squashed onto the ground. Lower light = longer
     * shadow; the shear direction follows the light's x position. */
    function drawCastShadow(key, cx, groundY, frame, animT) {
      const a = ART[key];
      if (!a) return;
      const th = THEMES[save.theme] || THEMES.day;
      const [lx, ly] = sunPos(th);
      const e = Math.min(1, Math.max(0, ly / horizonY)); // 0 high light, 1 at horizon
      const dir = Math.max(-1.6, Math.min(1.6, (cx - lx) / (GW * 0.35)));
      const kx = dir * (0.35 + 0.9 * e);   // horizontal shear away from the light
      const ksq = 0.20 + 0.30 * e;         // spill toward the camera
      const f = frameIndex(a, frame, animT);
      const d = a.detail;
      const w = a.fw / d;
      const h = a.fh / d;
      const feetY = h - a.pad / d;         // feet row within the frame, world units
      ctx.save();
      ctx.globalAlpha = th.shadowAlpha;
      ctx.translate(Math.round(cx), Math.round(groundY));
      // pixels above the feet have negative y here, so negate the
      // shear to make the silhouette lean away from the light
      ctx.transform(1, 0, -kx, -ksq, 0, 0);
      ctx.drawImage(a.shadow, f * a.fw, 0, a.fw, a.fh, -w / 2, -feetY, w, h);
      ctx.restore();
    }

    function drawClouds(th) {
      const [lx, ly] = sunPos(th);
      ctx.globalAlpha = th.cloudAlpha;
      for (const c of scene.clouds) {
        if (!c.sil) {
          c.sil = (SPRITES.cloud.src && ART.cloud) ? ART.cloud.img : genCloudSil();
        }
        const w = c.fw * GW, h = c.fh * horizonY;
        const dist = Math.hypot(
          (c.x + w / 2 - lx) / (GW * 0.75),
          (c.fy * horizonY + h / 2 - ly) / (horizonY * 0.9));
        const bucket = Math.min(3, Math.floor(dist * 3));
        if (bucket !== c.bucket) {   // retint only when the light bucket changes
          c.bucket = bucket;
          c.tinted = tintCloud(c.sil, th.cloudLit[bucket], th.cloudShade[bucket]);
        }
        ctx.drawImage(c.tinted, Math.round(c.x), Math.round(c.fy * horizonY), Math.round(w), Math.round(h));
      }
      ctx.globalAlpha = 1;
    }

    function drawGround(th) {
      ctx.fillStyle = th.ground;
      ctx.fillRect(0, horizonY, GW, GH - horizonY);
      // lighter dithered haze band along the horizon
      ctx.fillStyle = th.groundLight;
      ctx.fillRect(0, horizonY, GW, 5);
      for (let x = 0; x < GW; x += 4) ctx.fillRect(x, horizonY + 5, 2, 2);
      ctx.fillStyle = th.groundDark;
      ctx.fillRect(0, horizonY, GW, 1);
      for (const t of scene.tufts) {
        const tx = Math.round(t[0] * (GW - 4)) + 2;
        const ty = horizonY + 8 + Math.round(t[1] * (GH - horizonY - 14));
        ctx.fillRect(tx, ty, 2, 1);
      }
    }

    function drawStick() {
      if (stick.inFlight) {
        // small blob shadow tracking the ground point under the arc
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        const gx = stick.sx + (stick.tx - stick.sx) * stick.t;
        const gy = stick.sy + (stick.ty - stick.sy) * stick.t;
        ctx.fillRect(Math.round(gx - 4), Math.round(Math.min(gy, GH - 2)), 8, 2);
        drawSprite("stick", stick.x, stick.y + 2, 0, 0);
      } else if (stick.onGround) {
        drawCastShadow("stick", stick.x, stick.y + 2, 0, 0);
        drawSprite("stick", stick.x, stick.y + 2, 0, 0);
      }
    }

    function dogSpriteKey() {
      if (dog.state === "fetch") return dog.dir === "N" ? "runN" : "runNE";
      if (dog.state === "return") return dog.dir === "S" ? "runS" : "runSW";
      if (dog.state === "pickup") return "runS";
      return "idle";
    }

    function drawDog() {
      const key = dogSpriteKey();
      const frame = dog.state === "pickup" ? 0 : null;
      drawCastShadow(key, dog.x, dog.y, frame, dog.animT);
      drawSprite(key, dog.x, dog.y, frame, dog.animT);
    }

    function draw() {
      const th = THEMES[save.theme] || THEMES.day;
      if (skyCanvas) ctx.drawImage(skyCanvas, 0, 0);
      else { ctx.fillStyle = th.sky[0]; ctx.fillRect(0, 0, GW, horizonY); }
      drawClouds(th);
      drawGround(th);
      drawStick();
      drawDog();
    }

    /* ============================================================
     * 7. GAME STATE & LOGIC
     * ============================================================ */

    let save = { score: 0, msgIndex: 0, theme: "day" };
    try {
      const raw = localStorage.getItem(CONFIG.SAVE_KEY);
      if (raw) save = Object.assign(save, JSON.parse(raw));
    } catch (e) { /* private mode etc - play without saving */ }

    function persist() {
      try { localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(save)); } catch (e) { }
    }

    const translateUnlocked = () => save.score >= CONFIG.TRANSLATE_UNLOCK_AT;
    const skyUnlocked = () => translateUnlocked() && save.msgIndex >= MESSAGES.length;

    const dog = {
      x: HOME_X, y: 272,
      state: "idle",   // idle | fetch | pickup | return
      dir: "S",        // N | NE | S | SW while moving
      animT: 0,
      pickupT: 0,
    };

    const stick = {
      inFlight: false,
      onGround: false,
      t: 0,                     // flight progress 0..1
      sx: 0, sy: 0,             // thrown from (bottom of screen)
      tx: 0, ty: 0,             // landing point
      x: 0, y: 0,               // current draw position
    };

    function throwStick(tx, ty) {
      stick.inFlight = true;
      stick.onGround = false;
      stick.t = 0;
      stick.sx = GW * 0.55;     // thrown from "you", off the bottom edge
      stick.sy = GH + 6;
      stick.tx = tx;
      stick.ty = ty;
    }

    function updateStickFlight(dt) {
      stick.t += (dt * 1000) / CONFIG.STICK_FLIGHT_MS;
      if (stick.t >= 1) {
        stick.t = 1;
        stick.inFlight = false;
        stick.onGround = true;
        stick.x = stick.tx;
        stick.y = stick.ty;
        dog.state = "fetch";
        dog.animT = 0;
        return;
      }
      // straight line to the target plus a sine arc for height
      stick.x = stick.sx + (stick.tx - stick.sx) * stick.t;
      stick.y = stick.sy + (stick.ty - stick.sy) * stick.t
        - Math.sin(stick.t * Math.PI) * GH * 0.22;
    }

    function updateDog(dt) {
      const stepFor = (dir) => CONFIG.DOG_SPEED[dir] * dt;
      const diagFor = (dir) => stepFor(dir) / Math.SQRT2;

      if (dog.state === "fetch") {
        const dx = stick.tx - dog.x;
        const dy = stick.ty - dog.y;    // negative: stick is above the dog
        if (dx > 0.5 && dy < -0.5) {
          dog.dir = "NE";
          const diag = diagFor("NE");
          dog.x += Math.min(diag, dx);
          dog.y -= Math.min(diag, -dy);
        } else if (dy < -0.5) {
          dog.dir = "N";
          dog.y -= Math.min(stepFor("N"), -dy);
        } else if (dx > 0.5) {
          // stick sits exactly on the cone edge; NE finishes the approach
          dog.dir = "NE";
          dog.x += Math.min(diagFor("NE"), dx);
        } else {
          dog.state = "pickup";
          dog.pickupT = 0;
          dog.dir = "S";
          stick.onGround = false;  // in the mouth now (baked into S/SW art)
        }
      } else if (dog.state === "pickup") {
        dog.pickupT += dt * 1000;
        if (dog.pickupT >= CONFIG.PICKUP_PAUSE_MS) {
          dog.state = "return";
          dog.animT = 0;
        }
      } else if (dog.state === "return") {
        const dx = dog.x - HOME_X;      // positive: dog is right of home
        const dy = homeY - dog.y;       // positive: home is below the dog
        if (dx > 0.5 && dy > 0.5) {
          dog.dir = "SW";
          const diag = diagFor("SW");
          dog.x -= Math.min(diag, dx);
          dog.y += Math.min(diag, dy);
        } else if (dy > 0.5) {
          dog.dir = "S";
          dog.y += Math.min(stepFor("S"), dy);
        } else if (dx > 0.5) {
          dog.dir = "SW";
          dog.x -= Math.min(diagFor("SW"), dx);
        } else {
          dog.x = HOME_X;
          dog.y = homeY;
          dog.state = "idle";
          dog.dir = "S";
          dog.animT = 0;
          deliver();
        }
      }
    }

    /* fetch complete: score it and drive unlocks / messages */
    function deliver() {
      const before = save.score;
      save.score += CONFIG.POINTS_PER_FETCH;
      toast("+" + CONFIG.POINTS_PER_FETCH);

      const justUnlockedTranslate =
        before < CONFIG.TRANSLATE_UNLOCK_AT && save.score >= CONFIG.TRANSLATE_UNLOCK_AT;

      if (justUnlockedTranslate) {
        queuePopup("Woof! woof! I hope you remember me! My human gifted me to you one midnight in June.", null);
      } else if (translateUnlocked() && save.msgIndex < MESSAGES.length) {
        const m = MESSAGES[save.msgIndex];
        save.msgIndex += 1;
        for (const page of (m.pages || [m])) queuePopup(page.text, page.art);
        if (save.msgIndex >= MESSAGES.length) {
          queuePopup("You can change the sky now, and play with me forever. But reply to him first! I'll be right here.", null);
        }
      }
      persist();
      updateHUD();
    }

    function update(dt) {
      dog.animT += dt;
      for (const c of scene.clouds) {   // clouds drift slowly and wrap
        c.x += c.drift * dt;
        const w = c.fw * GW;
        if (c.x > GW + 4) c.x = -w - 2;
        else if (c.x < -w - 4) c.x = GW + 2;
      }
      if (stick.inFlight) updateStickFlight(dt);
      updateDog(dt);
    }

    /* ============================================================
     * 8. UI - HUD, popups, input.
     * ============================================================ */

    const scoreEl = document.getElementById("score");
    const themeBtn = document.getElementById("themeBtn");
    const hintEl = document.getElementById("hint");
    const toastEl = document.getElementById("toast");
    const backdropEl = document.getElementById("backdrop");
    const bubbleEl = document.getElementById("bubble");
    const bubbleTextEl = document.getElementById("bubbleText");
    const bubbleArtEl = document.getElementById("bubbleArt");
    const bubbleTapEl = document.getElementById("bubbleTap");

    function updateHUD() {
      scoreEl.textContent = "SCORE " + save.score;
      themeBtn.style.display = skyUnlocked() ? "block" : "none";
      themeBtn.textContent = "SKY: " + (THEMES[save.theme] || THEMES.day).label;
    }

    function toast(text) {
      toastEl.textContent = text;
      toastEl.classList.remove("show");
      void toastEl.offsetWidth;   // restart the animation
      toastEl.classList.add("show");
    }

    /* --- speech bubble: a queue of pages, one tap per page --- */
    const popupQueue = [];
    let popupOpen = false;

    function updateTapLabel() {
      bubbleTapEl.textContent = popupQueue.length > 0 ? "TAP FOR MORE" : "TAP TO CLOSE";
    }

    function queuePopup(text, art) {
      popupQueue.push({ text, art });
      if (!popupOpen) showNextPopup();
      else updateTapLabel();   // a page queued behind the open one
    }

    function showNextPopup() {
      const p = popupQueue.shift();
      if (!p) {
        popupOpen = false;
        backdropEl.style.display = "none";
        bubbleEl.style.display = "none";
        return;
      }
      popupOpen = true;
      bubbleTextEl.textContent = p.text;
      if (p.art) {
        bubbleArtEl.src = p.art;
        bubbleArtEl.style.display = "block";
      } else {
        bubbleArtEl.style.display = "none";
      }
      updateTapLabel();
      backdropEl.style.display = "block";
      bubbleEl.style.display = "block";
    }

    backdropEl.addEventListener("pointerdown", showNextPopup);
    bubbleEl.addEventListener("pointerdown", showNextPopup);

    /* --- theme button --- */
    themeBtn.addEventListener("pointerdown", (e) => {
      e.stopPropagation();
      const i = THEME_ORDER.indexOf(save.theme);
      save.theme = THEME_ORDER[(i + 1) % THEME_ORDER.length];
      for (const c of scene.clouds) c.bucket = -1;   // retint for the new light
      rebuildSky();
      persist();
      updateHUD();
    });

    /* --- throwing: tap the grass --- */
    let hintShown = true;

    canvas.addEventListener("pointerdown", (e) => {
      if (popupOpen) { showNextPopup(); return; }
      if (dog.state !== "idle" || stick.inFlight) return;

      const rect = canvas.getBoundingClientRect();
      let gx = ((e.clientX - rect.left) / rect.width) * GW;
      let gy = ((e.clientY - rect.top) / rect.height) * GH;

      // the whole stick sprite must land on the grass, whatever the
      // screen shape: margins derive from its actual drawn size
      const sa = ART.stick;
      const stickHalfW = sa ? (sa.fw / sa.detail) / 2 + 1 : 8;
      const stickH = sa ? (sa.fh - sa.pad) / sa.detail : 6;
      const grassTop = horizonY + stickH + 3;
      gx = Math.max(stickHalfW, Math.min(GW - stickHalfW, gx));
      // keep the reachable cone (below) from pushing it into the sky
      gx = Math.min(gx, HOME_X + homeY - grassTop);
      gy = Math.max(grassTop, Math.min(homeY, gy));
      // clamp into the dog's reachable cone: it only runs N and NE,
      // so the stick must land at or above the 45-degree line from home
      const coneY = homeY - Math.max(0, gx - HOME_X);
      if (gy > coneY) gy = coneY;

      throwStick(gx, gy);
      if (hintShown) { hintShown = false; hintEl.style.opacity = "0"; }
    });

    /* --- debug: tap the score 7 times quickly to reset progress --- */
    let resetTaps = 0, resetTimer = null;
    scoreEl.addEventListener("pointerdown", () => {
      resetTaps += 1;
      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => { resetTaps = 0; }, 1500);
      if (resetTaps >= 7) {
        resetTaps = 0;
        save = { score: 0, msgIndex: 0, theme: "day" };
        persist();
        rebuildSky();
        updateHUD();
        toast("RESET");
      }
    });

    /* ============================================================
     * 9. BOOT
     * ============================================================ */

    let lastT = 0;
    function frame(now) {
      const dt = Math.min(0.05, (now - lastT) / 1000 || 0);
      lastT = now;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", resize);
    resize();
    updateHUD();
    loadSprites().then(() => {
      rebuildSky();
      requestAnimationFrame(frame);
    });
  </script>
</body>

</html>
